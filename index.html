<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学バトルアリーナ</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #111;
    color: white;
}
h1 {
    margin-top: 20px;
}
#game {
    margin-top: 30px;
}
button {
    padding: 10px 20px;
    font-size: 16px;
    margin: 10px;
    cursor: pointer;
}
input {
    padding: 8px;
    font-size: 16px;
    width: 100px;
    text-align: center;
}
</style>
</head>
<body>

<h1>数学バトルアリーナ</h1>
<p>60秒でどこまで解ける？</p>

<div id="game">
    <p id="question">スタートを押してください</p>
    <input type="number" id="answer" disabled>
    <br>
    <button onclick="startGame()">スタート</button>
    <p>残り時間: <span id="time">60</span> 秒</p>
    <p>スコア: <span id="score">0</span></p>
</div>

<script>
let time = 60;
let score = 0;
let currentAnswer = 0;
let timer;

function generateQuestion() {
    let a = Math.floor(Math.random() * 20) - 10;
    let b = Math.floor(Math.random() * 20) - 10;
    currentAnswer = a + b;
    document.getElementById("question").textContent = `${a} + ${b} = ?`;
}

function startGame() {
    time = 60;
    score = 0;
    document.getElementById("score").textContent = score;
    document.getElementById("time").textContent = time;
    document.getElementById("answer").disabled = false;
    document.getElementById("answer").value = "";
    generateQuestion();

    timer = setInterval(() => {
        time--;
        document.getElementById("time").textContent = time;
        if (time <= 0) {
            clearInterval(timer);
            document.getElementById("question").textContent = "終了！";
            document.getElementById("answer").disabled = true;
        }
    }, 1000);
}

document.getElementById("answer").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        let userAnswer = Number(this.value);
        if (userAnswer === currentAnswer) {
            score++;
            document.getElementById("score").textContent = score;
        }
        this.value = "";
        generateQuestion();
    }
});
</script>

</body>
</html>
