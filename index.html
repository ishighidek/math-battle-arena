<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>数学バトルアリーナ 2.0</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f4f6f9;
  margin: 0;
  padding: 20px;
  transition: background-color 0.3s;
}

select, button, input {
  padding: 8px;
  margin: 5px;
  font-size: 16px;
}

button {
  background-color: #4CAF50;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background-color: #45a049;
}

.timer { font-weight: bold; color: red; }

.correct { background-color: #d4edda !important; }
.wrong { background-color: #f8d7da !important; }

.hidden { display: none; }

footer {
  margin-top: 40px;
  padding: 20px;
  background: #ddd;
}
</style>
</head>

<body>

<h1>数学バトルアリーナ 2.0</h1>

<h2>① 学年</h2>
<select id="gradeSelect">
  <option value="1">中1</option>
</select>

<h2>② 単元</h2>
<select id="unitSelect">
  <option value="seifu">正負の数</option>
  <option value="equation">方程式</option>
</select>

<h2>③ モード</h2>
<select id="modeSelect">
  <option value="time">60秒タイムアタック</option>
  <option value="clear">10問クリア</option>
</select>

<br>
<button onclick="startGame()">ゲーム開始</button>

<hr>

<div id="gameArea" class="hidden">
  <div class="timer" id="timerArea"></div>
  <h2 id="problem"></h2>
  <input type="text" id="answer" inputmode="numeric">
  <button onclick="checkAnswer()">回答</button>
  <p id="score"></p>
  <p id="result"></p>
</div>

<hr>

<footer>
  <p>© 2026 数学バトルアリーナ</p>
  <p>
    <a href="privacy.html">Privacy Policy</a> |
    <a href="contact.html">Contact</a>
  </p>
</footer>

<script>
let score = 0;
let correctAnswer = 0;
let timeLeft = 60;
let timerInterval = null;
let questionCount = 0;
let currentMode = "";
let currentUnit = "";
let gameActive = false;

const problem = document.getElementById("problem");
const answerInput = document.getElementById("answer");

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// 演算子の後に来る負の数だけ ( ) を付ける
function formatAfterOperator(n) {
  return n < 0 ? "(" + n + ")" : n;
}

function startGame() {
  score = 0;
  questionCount = 0;
  gameActive = true;

  currentMode = document.getElementById("modeSelect").value;
  currentUnit = document.getElementById("unitSelect").value;

  document.getElementById("gameArea").classList.remove("hidden");
  document.getElementById("result").innerText = "";
  document.getElementById("score").innerText = "Score: 0";

  answerInput.value = "";
  answerInput.focus();

  clearInterval(timerInterval);

  if (currentMode === "time") {
    timeLeft = 60;
    document.getElementById("timerArea").innerText = "残り時間：" + timeLeft;

    timerInterval = setInterval(() => {
      timeLeft--;
      document.getElementById("timerArea").innerText = "残り時間：" + timeLeft;
      if (timeLeft <= 0) endGame();
    }, 1000);

  } else {
    document.getElementById("timerArea").innerText = "10問中 0 / 10";
  }

  generateProblem();
}

function endGame() {
  clearInterval(timerInterval);
  gameActive = false;
  document.getElementById("result").innerText =
    "終了！スコア：" + score;
}

function generateProblem() {
  if (!gameActive) return;

  let a, b;

  // ===== 正負の数 =====
  if (currentUnit === "seifu") {

    const type = rand(0, 3);

    if (type === 0) {
      a = rand(-10, 10);
      b = rand(-10, 10);
      correctAnswer = a + b;
      problem.innerText = a + " + " + formatAfterOperator(b);
    }

    if (type === 1) {
      a = rand(-10, 10);
      b = rand(-10, 10);
      correctAnswer = a - b;
      problem.innerText = a + " - " + formatAfterOperator(b);
    }

    if (type === 2) {
      a = rand(-5, 5);
      correctAnswer = Math.abs(a);
      problem.innerText = "|" + a + "|";
    }

    if (type === 3) {
      a = rand(-5, 5);
      correctAnswer = a * a;
      problem.innerText = a + "²";
    }
  }

// ===== 方程式 ax = b =====
if (currentUnit === "equation") {

  a = rand(-10, 10);
  while (a === 0) {
    a = rand(-10, 10);
  }

  let x = rand(-10, 10);
  let bVal = a * x;

  correctAnswer = x;

  // = の後ろはそのまま表示（括弧なし）
  problem.innerText = a + "x = " + bVal;
}
  
}

function checkAnswer() {
  if (!gameActive) return;

  const userAnswer = parseInt(answerInput.value);

  if (!isNaN(userAnswer) && userAnswer === correctAnswer) {
    score++;
    flash("correct");
  } else {
    flash("wrong");
  }

  questionCount++;

  document.getElementById("score").innerText = "Score: " + score;

  if (currentMode === "clear") {
    document.getElementById("timerArea").innerText =
      "10問中 " + questionCount + " / 10";

    if (questionCount >= 10) {
      endGame();
      return;
    }
  }

  answerInput.value = "";
  answerInput.focus();
  generateProblem();
}

function flash(type) {
  document.body.classList.add(type);
  setTimeout(() => {
    document.body.classList.remove(type);
  }, 300);
}

answerInput.addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    checkAnswer();
  }
});
</script>

</body>
</html>
