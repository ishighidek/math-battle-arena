<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>数学バトルアリーナ2.0</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f4f6f9;
  margin: 0;
  padding: 20px;
  transition: background-color 0.3s;
}

select, button, input {
  padding: 8px;
  margin: 5px;
  font-size: 16px;
}

button {
  background-color: #4CAF50;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background-color: #45a049;
}

.correct { background-color: #d4edda !important; }
.wrong { background-color: #f8d7da !important; }

.timer { font-weight: bold; color: red; }

.hidden { display: none; }
</style>
</head>

<body>

<h1>数学バトルアリーナ 2.0</h1>

<h2>① 学年</h2>
<select id="gradeSelect">
  <option value="1">中1</option>
</select>

<h2>② 単元</h2>
<select id="unitSelect">
  <option value="seifu">正負の数</option>
  <option value="equation">方程式</option>
</select>

<h2>③ モード</h2>
<select id="modeSelect">
  <option value="time">60秒タイムアタック</option>
  <option value="clear">10問クリア</option>
</select>

<br>
<button onclick="startGame()">ゲーム開始</button>

<hr>

<div id="gameArea" class="hidden">
  <div class="timer" id="timerArea"></div>
  <h2 id="problem"></h2>
  <input type="text" id="answer">
  <button onclick="checkAnswer()">回答</button>
  <p id="score"></p>
  <p id="result"></p>
</div>

<script>
let score = 0;
let correctAnswer;
let timeLeft = 60;
let timerInterval;
let questionCount = 0;
let currentMode;
let currentUnit;
let gameActive = false;

const problem = document.getElementById("problem");
const answerInput = document.getElementById("answer");

function startGame() {
  score = 0;
  questionCount = 0;
  gameActive = true;

  currentMode = document.getElementById("modeSelect").value;
  currentUnit = document.getElementById("unitSelect").value;

  document.getElementById("gameArea").classList.remove("hidden");
  document.getElementById("result").innerText = "";
  document.getElementById("score").innerText = "Score: 0";

  answerInput.value = "";
  answerInput.focus();

  if (currentMode === "time") {
    timeLeft = 60;
    document.getElementById("timerArea").innerText = "残り時間：" + timeLeft;
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timeLeft--;
      document.getElementById("timerArea").innerText = "残り時間：" + timeLeft;
      if (timeLeft <= 0) endGame();
    }, 1000);
  } else {
    document.getElementById("timerArea").innerText = "10問中 0 / 10";
  }

  generateProblem();
}

function endGame() {
  clearInterval(timerInterval);
  gameActive = false;
  document.getElementById("result").innerText =
    "終了！スコア：" + score;
}

function generateProblem() {
  if (!gameActive) return;

  let a, b;

// 正負の数
if (currentUnit === "seifu") {
  const type = Math.floor(Math.random() * 4);

  function formatAfterOperator(n) {
    return n < 0 ? "(" + n + ")" : n;
  }

  if (type === 0) {
    a = rand(-10,10);
    b = rand(-10,10);
    correctAnswer = a + b;
    problem.innerText = a + " + " + formatAfterOperator(b);
  }

  if (type === 1) {
    a = rand(-5,5);
    correctAnswer = Math.abs(a);
    problem.innerText = "|" + a + "|";
  }

  if (type === 2) {
    a = rand(-5,5);
    correctAnswer = a * a;
    problem.innerText = a + "²";
  }

  if (type === 3) {
    a = rand(-10,10);
    b = rand(-10,10);
    correctAnswer = a - b;
    problem.innerText = a + " - " + formatAfterOperator(b);
  }
}

// 方程式 ax = b
if (currentUnit === "equation") {

  function formatAfterOperator(n) {
    return n < 0 ? "(" + n + ")" : n;
  }

  a = rand(-10,10);
  while (a === 0) {
    a = rand(-10,10);
  }

  let x = rand(-10,10);
  let bVal = a * x;

  correctAnswer = x;

  problem.innerText = a + "x = " + formatAfterOperator(bVal);
}
  
function checkAnswer() {
  if (!gameActive) return;

  const userAnswer = parseInt(answerInput.value);
  questionCount++;

  if (userAnswer === correctAnswer) {
    score++;
    flash("correct");
  } else {
    flash("wrong");
  }

  document.getElementById("score").innerText = "Score: " + score;

  if (currentMode === "clear") {
    document.getElementById("timerArea").innerText =
      "10問中 " + questionCount + " / 10";
    if (questionCount >= 10) endGame();
  }

  answerInput.value = "";
  answerInput.focus();
  generateProblem();
}

function flash(type) {
  document.body.classList.add(type);
  setTimeout(() => {
    document.body.classList.remove(type);
  }, 300);
}

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

answerInput.addEventListener("keydown", function(event) {
  if (event.key === "Enter") checkAnswer();
});
</script>

</body>
</html>
