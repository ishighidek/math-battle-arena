<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>数学バトルアリーナ｜中学生向け計算タイムアタックゲーム</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f4f6f9;
  margin: 0;
  padding: 20px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  background-color: #4CAF50;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background-color: #45a049;
}

input {
  padding: 8px;
  font-size: 16px;
}

.timer {
  font-size: 20px;
  font-weight: bold;
  color: red;
}

footer {
  margin-top: 40px;
  padding: 20px;
  background: #ddd;
}
.correct {
  background-color: #d4edda;
  transition: background-color 0.3s;
}

.wrong {
  background-color: #f8d7da;
  transition: background-color 0.3s;
}
</style>
</head>

<body>

<h1>数学バトルアリーナ</h1>

<p>60秒間で何問解けるか挑戦しよう！</p>

<h2>学年を選択</h2>
<button onclick="setGrade(1)">中1</button>
<button onclick="setGrade(2)">中2</button>
<button onclick="setGrade(3)">中3</button>

<p id="currentGrade">現在：中1モード</p>

<hr>

<div class="timer">残り時間：<span id="time">60</span>秒</div>

<h2 id="problem"></h2>

<input type="text" id="answer" inputmode="numeric" pattern="[0-9\-]*" placeholder="答え">
<button onclick="checkAnswer()">回答</button>

<p id="score">Score: 0</p>
<p id="result"></p>

<button onclick="startGame()">ゲーム開始</button>

<h2>🏆 自己ベスト</h2>
<p id="bestScore">0</p>

<hr>
<footer>
<p>© 2026 数学バトルアリーナ</p>
<p>
<a href="privacy.html">Privacy Policy</a> |
<a href="contact.html">Contact</a>
</p>
</footer>

<script>
let score = 0;
let correctAnswer;
let currentGrade = 1;
let timeLeft = 60;
let timerInterval;
let gameActive = false;

const problem = document.getElementById("problem");

function setGrade(grade) {
  currentGrade = grade;
  document.getElementById("currentGrade").innerText =
    "現在：中" + grade + "モード";
  loadBestScore();
}

function startGame() {
  score = 0;
  timeLeft = 60;
  gameActive = true;
  document.getElementById("score").innerText = "Score: 0";
  document.getElementById("result").innerText = "";
  document.getElementById("time").innerText = timeLeft;

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;
    if (timeLeft <= 0) {
      endGame();
    }
  }, 1000);

  generateProblem();
}

function endGame() {
  clearInterval(timerInterval);
  gameActive = false;
  document.getElementById("result").innerText =
    "終了！あなたのスコアは " + score + " 点です！";
  saveBestScore();
}

function generateProblem() {
  if (!gameActive) return;

  let a, b;

  if (currentGrade === 1) {
    a = Math.floor(Math.random() * 20) - 10;
    b = Math.floor(Math.random() * 20) - 10;
    correctAnswer = a + b;
    problem.innerText = a + " + " + b;
  }

  if (currentGrade === 2) {
    a = Math.floor(Math.random() * 12);
    b = Math.floor(Math.random() * 12);
    correctAnswer = a * b;
    problem.innerText = a + " × " + b;
  }

  if (currentGrade === 3) {
    a = Math.floor(Math.random() * 15);
    correctAnswer = a * a;
    problem.innerText = a + "² は？";
  }
}

.correct {
  background-color: #d4edda;
  transition: background-color 0.3s;
}

.wrong {
  background-color: #f8d7da;
  transition: background-color 0.3s;
}
  
function saveBestScore() {
  const key = "bestScore_grade" + currentGrade;
  const best = localStorage.getItem(key);
  if (!best || score > best) {
    localStorage.setItem(key, score);
  }
  loadBestScore();
}

function loadBestScore() {
  const key = "bestScore_grade" + currentGrade;
  const best = localStorage.getItem(key) || 0;
  document.getElementById("bestScore").innerText = best;
}

loadBestScore();
loadBestScore();

document.getElementById("answer").addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    checkAnswer();
  }
});
</script>

</body>
</html>
