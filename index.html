<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>数学バトルアリーナ｜中学生向け計算タイムアタックゲーム</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f4f6f9;
  margin: 0;
  padding: 20px;
}

h1 {
  color: #333;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  background-color: #4CAF50;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background-color: #45a049;
}

input {
  padding: 8px;
  font-size: 16px;
}

footer {
  margin-top: 40px;
  padding: 20px;
  background: #ddd;
}
</style>
</head>

<body>

<h1>数学バトルアリーナ</h1>

<p>
数学バトルアリーナは、中学生向けの計算力を鍛える
無料タイムアタック型ゲームです。
制限時間内にできるだけ多くの問題を解き、
自己ベスト更新を目指しましょう。
</p>

<h2>学年を選択</h2>
<button onclick="setGrade(1)">中1モード</button>
<button onclick="setGrade(2)">中2モード</button>
<button onclick="setGrade(3)">中3モード</button>

<p id="currentGrade">現在：中1モード</p>

<hr>

<h2 id="problem"></h2>

<input type="number" id="answer" placeholder="答えを入力">
<button onclick="checkAnswer()">回答</button>

<p id="score">Score: 0</p>

<h2>計算力を伸ばすメリット</h2>
<p>
計算スピードが上がると、定期テストや高校入試で
大きなアドバンテージになります。
毎日3分のトレーニングを習慣化しましょう。
</p>

<hr>
<footer>
<p>© 2026 数学バトルアリーナ</p>
<p>
<a href="privacy.html">Privacy Policy</a> |
<a href="contact.html">Contact</a>
</p>
</footer>

<script>
let score = 0;
let correctAnswer;
let currentGrade = 1;

const problem = document.getElementById("problem");

function setGrade(grade) {
  currentGrade = grade;
  document.getElementById("currentGrade").innerText =
    "現在：中" + grade + "モード";
  generateProblem();
}

function generateProblem() {
  let a, b;

  if (currentGrade === 1) {
    a = Math.floor(Math.random() * 20) - 10;
    b = Math.floor(Math.random() * 20) - 10;
    correctAnswer = a + b;
    problem.innerText = a + " + " + b;
  }

  if (currentGrade === 2) {
    a = Math.floor(Math.random() * 12);
    b = Math.floor(Math.random() * 12);
    correctAnswer = a * b;
    problem.innerText = a + " × " + b;
  }

  if (currentGrade === 3) {
    a = Math.floor(Math.random() * 15);
    correctAnswer = a * a;
    problem.innerText = a + "² は？";
  }
}

function checkAnswer() {
  const userAnswer = document.getElementById("answer").value;
  if (parseInt(userAnswer) === correctAnswer) {
    score++;
  }
  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("answer").value = "";
  generateProblem();
}

generateProblem();
</script>

</body>
</html>
